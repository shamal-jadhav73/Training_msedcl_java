<!DOCTYPE html>
<html>

<head>
	<title>File Upload

	</title>
	<link rel="stylesheet" th:href="@{/css/main.css}">

</head>

<body>
	<div class="card">

		<img th:src="@{/images/msedcl_logo.jpg}" width="120" />
		<h3>File Upload</h3>
		<form th:action="@{/upload}" method="post" enctype="multipart/form-data" onSubmit="return validateForm()">
			<input type="file" name="file" id="file">
			<br><br>
			<button type="submit">Upload</button>
		</form>

		<p th:if="${success}" th:text="${success}" style="color: green;"></p>
		<p th:if="${error}" th:text="${error}" style="color: red;"></p>
	</div>
	<script th:src="@{/js/app.js}"></script>


</body>

</html>
