<!DOCTYPE html>
<html>

<head>
	<title>Spring MVC

	</title>

</head>

<body>
	<h3>List of Customers</h3>
	<table border="1">
		<tr>
			<th>Customer Id</th>
			<th>Name</th>
			<th>Email</th>
			<th>Mobile Number</th>
		</tr>
		<tr th:each="c: ${customers}">
			<td th:text="${c.customerId}"></td>
			<td th:text="${c.name}"></td>
			<td th:text="${c.email}"></td>
			<td th:text="${c.mobileNumber}"></td>
			
		</tr>
		
	</table>
	
	<br>
	<br>
		<a href="newcustomer">Add New Customer</a>
	
	
	
</body>

</html>
