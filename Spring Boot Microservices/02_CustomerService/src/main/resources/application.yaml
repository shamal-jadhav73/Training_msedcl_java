        password: root123
        url: jdbc:mysql://localhost:3306/customer_db
        driver-class-name: com.mysql.cj.jdbc.Driver
    config:
     import: "optional:configserver:http://localhost:8383"
    
    #to add other dependencies like uat and prod from git repositry (/06_ConfigServer project madhye enableconfig server lihilay)
