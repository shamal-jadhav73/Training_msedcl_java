spring:
    application:
        name: "transaction-service"
    datasource:
        username: root
        password: root123
        url: jdbc:mysql://localhost:3306/transactions_db
        driver-class-name: com.mysql.cj.jdbc.Driver
    profiles:
        active:
            - "uat"
    config:
        import: "optional:configserver:http://localhost:8383"
server:
    port: 8282
management:
    endpoints:
        web:
            exposure:
                include: "*"
springdoc:
    api-docs:
        enabled: false
logging:
    file:
        name: logs/transaction.log
#following code is for registration of cutomer service to eureka client 
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka
build:
    version: "2.0"
customer:
    message: "Welcome to Msedcl bank Transaction related REST API"
    contactDetails:
        name: "Snehal"
        email: "snehal@msedcl.in"
    onCallSupport:
        - 1234568789
        - 9876543210

