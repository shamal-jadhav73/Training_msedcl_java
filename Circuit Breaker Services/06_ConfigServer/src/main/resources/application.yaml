spring:
  application:
    name: "config-server"
  profiles:
    active:
    - git
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/shamal-jadhav73/msedcl-banking-config"
          default-label: main
          timeout: 5
          clone-on-start: true 
          force-pull: true
server:
  port: 8383

management:
  endpoints:
    web:
      exposure:
        include: "*"

