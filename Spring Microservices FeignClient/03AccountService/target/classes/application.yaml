spring:
    application:
        name: "account-service"
    datasource:
        username: root
        password: root123
        url: jdbc:mysql://localhost:3306/accounts_db
        driver-class-name: com.mysql.cj.jdbc.Driver

    config:
        import: "configserver:http://localhost:8383"
    profiles:
        active:
            - prod
management:
    endpoints:
        web:
            exposure:
                include: "*"
server:
    port: 8181

springdoc:
    api-docs:
        enabled: false
logging:
    file:
        name: logs/account.log


#following code is for registration of cutomer service to eureka client 
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka		

build:
    version: "2.0"
customer:
    message: "Welcome to Msedcl bank Account related REST API"
    contactDetails:
        name: "Shailesh"
        email: "shailesh@msedcl.in"
    onCallSupport:
        - 1234568789
        - 9876543210

